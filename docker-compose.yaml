name: mapathon

services:
  backend:
    container_name: mapathon-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5)"
        ]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - mapathon-network

  frontend:
    container_name: mapathon-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-https://api.mapathon.ir}"
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/health"
        ]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - mapathon-network

networks:
  mapathon-network:
    name: mapathon-network
    driver: bridge
